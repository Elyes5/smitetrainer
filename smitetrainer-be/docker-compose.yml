services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      CACHE_BACKEND: "redis"
      REDIS_ADDR: "redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  redis-data:

